<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Donation Counter</title>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #ffffff;
        color: #000000;
        margin: 0;
        padding: 20px;
    }

    h1 {
        font-size: 22px;
        margin-bottom: 5px;
    }

    .subtitle {
        font-size: 12px;
        color: #555;
        margin-bottom: 30px;
    }

    .circle {
        width: 220px;
        height: 220px;
        border-radius: 50%;
        background: conic-gradient(green 0deg, #e5e7eb 0deg);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: auto;
        transition: background 0.8s ease;
    }

    .circle-inner {
        width: 170px;
        height: 170px;
        border-radius: 50%;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border: 2px solid #e5e7eb;
    }

    .amount {
        font-size: 26px;
        font-weight: bold;
    }

    .goal {
        font-size: 12px;
        color: #555;
    }

    .people {
        margin-top: 20px;
        font-size: 18px;
    }
</style>
</head>
<body>

<h1>NEET - 2026 ( Full Syllabus Test ) Contribution Live Counter</h1>
<div class="subtitle">
This Payment Data Is Managed By @NEET2026TSsupportcontri_bot API Automatically
</div>

<div class="circle" id="circle">
    <div class="circle-inner">
        <div class="amount" id="amount">₹50</div>
        <div class="goal">Goal: ₹1500</div>
    </div>
</div>

<div class="people" id="people">👤 1 Person Contributed</div>

<script>
    let total = 50;
    let goal = 1500;
    let persons = 1;

    function animateValue(start, end, duration) {
        let startTime = null;

        function step(timestamp) {
            if (!startTime) startTime = timestamp;
            let progress = timestamp - startTime;
            let value = Math.floor(start + (end - start) * (progress / duration));

            document.getElementById("amount").innerText = "₹" + value;

            if (progress < duration) {
                requestAnimationFrame(step);
            } else {
                document.getElementById("amount").innerText = "₹" + end;
            }
        }

        requestAnimationFrame(step);
    }

    function updateUI(newAmount, newPersons) {
        let oldTotal = total;
        total = newAmount;
        persons = newPersons;

        let percent = (total / goal) * 100;
        let degrees = percent * 3.6;

        // Animate circle
        document.getElementById("circle").style.background =
            `conic-gradient(green ${degrees}deg, #e5e7eb ${degrees}deg)`;

        // Animate number
        animateValue(oldTotal, total, 800);

        // Update persons
        document.getElementById("people").innerText =
            "👤 " + persons + " Person Contributed";
    }

    // Initial load
    updateUI(50, 1);

    /*
    👉 HOW TO USE (IMPORTANT):

    When new donation comes, call:
    updateUI(newTotalAmount, newPersonCount);

    Example:
    updateUI(100, 2);
    */
</script>

</body>
</html>
